spring:
  application:
    name: recruitment-platform
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/recruitment_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none # Using Liquibase for schema management
  
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.xml

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: recruitment-group
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  mail:
    host: localhost
    port: 1025
    username: dummy
    password: dummy
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    com.avtech.recruitment: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
